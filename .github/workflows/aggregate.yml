name: Aggregate taekwondo feed

on:
  schedule:
    # Every 30 minutes. GitHub may delay or skip cron runs under load;
    # that's fine — the feed just refreshes a bit later.
    - cron: "*/30 * * * *"
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

# Only one aggregate run at a time. Lets the in-flight run finish (and
# commit) before any newer one starts — avoids the push race we hit on
# init when the manual dispatch fired while the push-trigger was still
# committing.
concurrency:
  group: aggregate
  cancel-in-progress: false

jobs:
  aggregate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run aggregator
        run: node aggregate.mjs

      - name: Commit updated feed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/news.json
          if git diff --staged --quiet; then
            echo "No changes."
          else
            git commit -m "chore: update news feed"
            git push
          fi
